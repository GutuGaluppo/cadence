name: Bug report
description: Report a reproducible defect in the desktop app, landing page, or release flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected result.
      placeholder: The timer resets after pausing on a task with custom durations...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a short deterministic sequence.
      placeholder: |
        1. Open the app
        2. Create a task with custom durations
        3. Start, pause, then reopen the app
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - Landing page
        - Release/download
        - Documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version, tag, or commit SHA if known.
      placeholder: v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS version, architecture, and any relevant setup details.
      placeholder: macOS 15.0, Apple Silicon, downloaded from GitHub Releases
